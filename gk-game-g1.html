<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GKトレーニング 8人制 - 物理リアル + AI v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
:root{--cyan:#00e5c8;--gold:#f7d44c;--red:#ff4545;--blue:#4da6ff;--bg:#0b1c12;--panel:rgba(8,24,14,0.95);--text:#d8f0e2;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}
header{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;background:rgba(0,0,0,.55);border-bottom:2px solid var(--cyan);}
.h-title{font-family:'Orbitron',sans-serif;font-size:.86rem;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 12px rgba(0,229,200,.5);}
.h-right{display:flex;gap:10px;align-items:center;}
.score-tag{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--gold);}
.stage-chip{background:var(--cyan);color:#000;font-weight:900;font-size:.66rem;padding:2px 8px;border-radius:20px;font-family:'Orbitron',sans-serif;}
main{width:100%;max-width:520px;padding:6px 7px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;}
#field-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;border:2px solid rgba(0,229,200,.2);box-shadow:0 0 36px rgba(0,229,200,.08),0 6px 28px rgba(0,0,0,.7);cursor:crosshair;touch-action:none;}
canvas{display:block;width:100%;}
#phase-banner{width:100%;padding:7px 13px;border-radius:8px;background:var(--panel);border:1px solid rgba(0,229,200,.22);font-size:.82rem;line-height:1.6;text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center;}
#phase-banner .hl{color:var(--cyan);font-weight:700;}
#phase-banner .w{color:var(--gold);font-weight:700;}
#kick-row{display:flex;gap:5px;width:100%;}
.kt{flex:1;padding:7px 0;border:none;border-radius:7px;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:.76rem;cursor:pointer;transition:all .14s;}
.kt-kick{background:rgba(77,166,255,.18);color:var(--blue);border:1.5px solid var(--blue);}
.kt-kick.on{background:var(--blue);color:#fff;}
.kt-throw{background:rgba(247,212,76,.15);color:var(--gold);border:1.5px solid var(--gold);}
.kt-throw.on{background:var(--gold);color:#000;}
.kt-long{background:rgba(255,69,69,.15);color:var(--red);border:1.5px solid var(--red);}
.kt-long.on{background:var(--red);color:#fff;}
#power-row{width:100%;display:flex;align-items:center;gap:7px;font-size:.74rem;color:#88bbaa;}
#pw-bg{flex:1;height:9px;border-radius:5px;background:rgba(255,255,255,.08);overflow:hidden;cursor:pointer;}
#pw-fill{height:100%;width:50%;border-radius:5px;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .05s;}
#btn-row{display:flex;gap:7px;width:100%;}
.btn{flex:1;padding:8px 0;border:none;border-radius:7px;font-family:'Zen Kaku Gothic New',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;}
.btn-main{background:var(--cyan);color:#000;}
.btn-sub{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.12);}
#legend{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;font-size:.70rem;color:#7aaa8d;}
.leg{display:flex;align-items:center;gap:4px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
#overlay{display:none;position:absolute;left:50%;transform:translateX(-50%);z-index:200;align-items:flex-start;justify-content:center;width:82%;pointer-events:auto;}
#overlay.show{display:flex;}
.ov-box{background:rgba(4,14,8,0.72);border:2.5px solid var(--cyan);border-radius:12px;padding:12px 18px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.45);width:100%;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.ov-box.success{border-color:#00e5c8;box-shadow:0 0 20px rgba(0,229,200,.30);}
.ov-box.failure{border-color:#ff4545;box-shadow:0 0 20px rgba(255,69,69,.28);}
.ov-box.partial{border-color:#f7d44c;box-shadow:0 0 20px rgba(247,212,76,.25);}
.ov-icon{font-size:1.6rem;margin-bottom:2px;}
.ov-title{font-family:'Orbitron',sans-serif;font-size:.92rem;margin-bottom:2px;}
.ov-pts{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--gold);margin-bottom:4px;}
.ov-msg{font-size:.76rem;color:#99ccaa;line-height:1.5;margin-bottom:10px;}
</style>

<body>
<header>
  <div class="h-title">GK TRAINING 8v8 - AI v3 + 物理リアル</div>
  <div class="h-right">
    <span class="stage-chip" id="stage-chip">STAGE 1</span>
    <span class="score-tag"  id="score-disp">🏆 0</span>
  </div>
</header>
<main>
  <div id="learn-badge" style="width:100%;max-width:520px;text-align:center;font-size:.72rem;color:#6dbf9e;padding:3px 0 1px;letter-spacing:.5px;">🧠 初心者 | 0戦 | 習熟0%</div>
  <div id="field-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div class="ov-box" id="ov-box">
        <div class="ov-icon"  id="ov-icon">⚽</div>
        <div class="ov-title" id="ov-title">-</div>
        <div class="ov-pts"   id="ov-pts"></div>
        <div class="ov-msg"   id="ov-msg"></div>
        <button class="btn btn-main" onclick="nextRound()" style="width:100%;padding:7px 0;font-size:.82rem;">次のラウンド →</button>
      </div>
    </div>
  </div>
  <div id="phase-banner">読み込み中…</div>
  <div id="kick-row">
    <button class="kt kt-kick on" onclick="setKT('kick')"  id="btn-kt-kick">⚽ ゴールキック</button>

  <div id="power-row">

  </div>
  <div id="form-row" style="display:flex;gap:6px;width:100%;align-items:center;">
    <span style="font-size:.74rem;color:#88bbaa;white-space:nowrap;">味方</span>
    <select id="sel-tm" onchange="setFormation('tm',this.value)" style="flex:1;background:rgba(77,166,255,.15);color:var(--blue);border:1.5px solid var(--blue);border-radius:7px;padding:6px 4px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;outline:none;">
      <option value="random">🎲 ランダム</option>
      <option value="3-3-1">3-3-1</option>
      <option value="2-3-2">2-3-2</option>
      <option value="3-2-2">3-2-2</option>
      <option value="2-4-1">2-4-1</option>
    </select>
    <span style="font-size:.74rem;color:#88bbaa;white-space:nowrap;">相手</span>
    <select id="sel-op" onchange="setFormation('op',this.value)" style="flex:1;background:rgba(255,69,69,.15);color:var(--red);border:1.5px solid var(--red);border-radius:7px;padding:6px 4px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;outline:none;">
      <option value="random">🎲 ランダム</option>
      <option value="3-3-1">3-3-1</option>
      <option value="2-3-2">2-3-2</option>
      <option value="3-2-2">3-2-2</option>
      <option value="2-4-1">2-4-1</option>
    </select>
  </div>
  <div id="btn-row">
    <button class="btn btn-sub" onclick="resetRound()">🔄 やり直す</button>
    <button class="btn btn-sub" onclick="showHelp()">❓ ルール</button>
    <button class="btn btn-sub" onclick="resetLearning()" style="flex:.7;font-size:.72rem;">🗑 学習リセット</button>
  </div>
  <div id="legend">
    <span class="leg"><span class="dot" style="background:var(--cyan)"></span>GK</span>
    <span class="leg"><span class="dot" style="background:var(--blue)"></span>味方(7)</span>
    <span class="leg"><span class="dot" style="background:var(--red)"></span>相手(7)</span>
    <span class="leg"><span class="dot" style="background:var(--gold)"></span>ボール</span>
  </div>
</main>

<script>
// ================================================================
//  GK TRAINING 8v8 - 物理リアル + AI v3 完全統合版
// ================================================================
const SC = 6.5, FW = 50, FH = 68, PAD = 16;
const CW = FW*SC + PAD*2, CH = FH*SC + PAD*2;
const CV = document.getElementById('c');
const ctx = CV.getContext('2d');
CV.width = CW; CV.height = CH;

const px = mx => PAD + mx*SC;
const py = my => PAD + (FH - my)*SC;

// Field landmarks
const HALF = 34, OWN_PA = 12, OWN_GA = 4, OPP_PA = FH-12;
const GA_L = (FW-13)/2, GA_R = (FW+13)/2;
const PA_L = (FW-27)/2, PA_R = (FW+27)/2;
const CX = FW/2;

// Physics & Speed constants
const FPS = 60, DT = 1/FPS;
const mps = v => v * DT;

const MAX_KICK_MS = 25.0;
const KT = {
  kick: {col:'#4da6ff', label:'ゴールキック', defaultPower:.50},
  throw:{col:'#f7d44c', label:'スロー',       defaultPower:.35},
  long: {col:'#ff4545', label:'パントキック',  defaultPower:.60}
};
const ktSpd = () => mps(MAX_KICK_MS * G.power);

const PASS_SPD = mps(12.0);
const BALL_DECAY = 0.991;
const BALL_SLOW = mps(3.0);
const BALL_STOP = mps(1.2);

// 新物理パラメータ
const PLAYER_MAX_ACC_MS2 = 4.9;
const PLAYER_FRICTION = 0.918;
const DRIBBLE_ACC_MULT = 0.66;
const TURN_PENALTY_RAD = 1.65;

// Player speeds (m/s)
const TM_MAX_MS = 3.6, TM_DRIBBLE_MS = 3.0, TM_CHASE_BALL_MS = 4.6;
const OP_BASE_SPD_MS = 1.75, OP_BASE_INC_MS = 0.55;

// Radii
const R_TM_CATCH = 2.0, R_OP_INTERCEPT = 2.0, R_OP_TACKLE = 2.2;
const R_TM_FLEE = 12.3, R_DANGER_PASS = 4.9;

// State
let G = {
  stage:1, score:0, successCount:0,
  phase:'place', kickType:'kick', power:.50,
  ball:{mx:CX, my:OWN_GA+1, vmx:0, vmy:0, trail:[]},
  ballHolder:null, gk:{mx:CX, my:OWN_GA+1.5},
  teammates:[], opponents:[],
  aimMX:null, aimMY:null,
  timerF:0, timerRunning:false, pressDelayPassed:false,
  rafId:null, particles:[], dribbleTimer:0, ended:false,
  _offsideLine:null
};

// ====================== AI v3 ======================
const GRID_X=15, GRID_Y=20, HEAT_SIZE=GRID_X*GRID_Y;
const hIdx = (mx,my) => Math.min(GRID_X-1, Math.floor(mx/(FW/GRID_X))) * GRID_Y + Math.min(GRID_Y-1, Math.floor(my/(FH/GRID_Y)));
const EPS0     = 0.42;
  
// ====================== AI v3 + 学習システム ======================
const Brain = {
  tmHeat: new Float32Array(HEAT_SIZE).fill(0),
  opHeat: new Float32Array(HEAT_SIZE).fill(0),
  opMarkPref: Array.from({length:7}, () => new Float32Array(7).fill(0)),
  tmPredAcc: 0.0,
  opPredAcc: 0.0,
  eps: 0.45,
  EPS0: 0.45,                    // ← ここで明確に定義
  rounds: 0,

  tmHeatBias: new Float32Array(HEAT_SIZE).fill(0),
  opMarkAssign: new Array(7).fill(-1),
  tmPredFrames: 0,
  opPredFrames: 0,

  // マーク割り当て
  assignMarkRoles(){
    const assigned = new Set();
    this.opMarkAssign.fill(-1);
    if(this.rounds < 4) return;
    G.opponents.forEach((op, oi) => {
      let best = -1, bv = -Infinity;
      G.teammates.forEach((tm, ti) => {
        if(assigned.has(ti)) return;
        const v = this.opMarkPref[oi][ti] || 0;
        if(v > bv){ bv = v; best = ti; }
      });
      if(best >= 0 && bv > 0.08){
        this.opMarkAssign[oi] = best;
        assigned.add(best);
      }
    });
  },

  // 予測
  predictBall(frames){
    if(frames <= 0 || G.phase === 'place' || G.phase === 'aim') return null;
    let mx = G.ball.mx, my = G.ball.my, vmx = G.ball.vmx, vmy = G.ball.vmy;
    for(let i = 0; i < frames; i++){
      vmx *= BALL_DECAY; vmy *= BALL_DECAY;
      mx += vmx; my += vmy;
    }
    return {mx: clamp(mx, 0.5, FW-0.5), my: clamp(my, 5.1, FH-0.5)};
  },

  onBallCaught(tmIdx){
    const c = hIdx(G.teammates[tmIdx].mx, G.teammates[tmIdx].my);
    this.tmHeat[c] = Math.min(1.0, this.tmHeat[c] + 0.22);
  },

  onBallIntercepted(opIdx, tmIdx){
    if(opIdx < 0 || tmIdx < 0) return;
    this.opMarkPref[opIdx][tmIdx] = Math.min(1.0, (this.opMarkPref[opIdx][tmIdx] || 0) + 0.19);
  },

  // ラウンド終了時の学習
  onRoundEnd(success, pts){
    this.rounds++;
    const reward = success ? Math.min(1.8, pts/75) : -0.85;

    G.teammates.forEach(tm => {
      const c = hIdx(tm.mx, tm.my);
      this.tmHeat[c] += 0.16 * (reward - this.tmHeat[c]);
      this.tmHeat[c] = Math.max(-1, Math.min(1, this.tmHeat[c]));
    });
    G.opponents.forEach(op => {
      const c = hIdx(op.mx, op.my);
      this.opHeat[c] += 0.16 * (-reward - this.opHeat[c]);
      this.opHeat[c] = Math.max(-1, Math.min(1, this.opHeat[c]));
    });

    this.opMarkPref.forEach(row => {
      for(let i = 0; i < row.length; i++) row[i] *= 0.965;
    });

    this.tmPredAcc = Math.max(0, Math.min(1, this.tmPredAcc + (success ? 0.085 : -0.038)));
    this.opPredAcc = Math.max(0, Math.min(1, this.opPredAcc + (success ? -0.07 : 0.09)));

    this.eps = Math.max(0.04, this.eps - 0.011);
    this._recompute();
    updateLearnBadge();
    this.save();
  },

  _recompute(){
    for(let i = 0; i < HEAT_SIZE; i++){
      this.tmHeatBias[i] = this.tmHeat[i] * 2.4;
    }
    this.tmPredFrames = Math.round(this.tmPredAcc * 130);
    this.opPredFrames = Math.round(this.opPredAcc * 110);
    this.assignMarkRoles();
  },

  // ★★★ ここを修正：Promiseを返すようにする ★★★
  save(){
    try {
      const data = JSON.stringify({
        tmHeat: Array.from(this.tmHeat),
        opHeat: Array.from(this.opHeat),
        opMarkPref: this.opMarkPref.map(r => Array.from(r)),
        tmPredAcc: this.tmPredAcc,
        opPredAcc: this.opPredAcc,
        eps: this.eps,
        rounds: this.rounds
      });
      if (typeof localStorage !== 'undefined') {
        localStorage.setItem('gk_brain_v3', data);
      }
    } catch(e) {}
  },

  load(){
    return new Promise((resolve) => {
      try {
        if (typeof localStorage === 'undefined') {
          resolve();
          return;
        }
        const saved = localStorage.getItem('gk_brain_v3');
        if (!saved) {
          resolve();
          return;
        }
        const d = JSON.parse(saved);
        if (d.tmHeat) this.tmHeat = new Float32Array(d.tmHeat);
        if (d.opHeat) this.opHeat = new Float32Array(d.opHeat);
        if (d.opMarkPref) this.opMarkPref = d.opMarkPref.map(r => new Float32Array(r));
        this.tmPredAcc = d.tmPredAcc ?? 0;
        this.opPredAcc = d.opPredAcc ?? 0;
        this.eps = d.eps ?? 0.45;
        this.rounds = d.rounds ?? 0;
        this._recompute();
      } catch(e) {
        console.warn("学習データの読み込みに失敗しました", e);
      }
      resolve();
    });
  },

  resetData(){
    this.tmHeat.fill(0);
    this.opHeat.fill(0);
    this.opMarkPref = Array.from({length:7}, () => new Float32Array(7).fill(0));
    this.tmPredAcc = 0;
    this.opPredAcc = 0;
    this.eps = 0.45;
    this.rounds = 0;
    this._recompute();
    try { localStorage.removeItem('gk_brain_v3'); } catch(e){}
    updateLearnBadge();
  }
};

// ====================== 物理更新関数 ======================
function updatePhysics(p, targetVX, targetVY, maxSpd, isDribble = false){
  let vx = p.vx || 0, vy = p.vy || 0;
  const curSpd = Math.hypot(vx, vy);

  let desDirX = 1, desDirY = 0;
  const desLen = Math.hypot(targetVX, targetVY);
  if(desLen > 0.01){
    desDirX = targetVX / desLen;
    desDirY = targetVY / desLen;
  }

  const curDirX = curSpd > 0.03 ? vx/curSpd : desDirX;
  const curDirY = curSpd > 0.03 ? vy/curSpd : desDirY;
  const dot = curDirX*desDirX + curDirY*desDirY;
  const angleDiff = Math.acos(Math.max(-1, Math.min(1, dot)));

  let acc = PLAYER_MAX_ACC_MS2 * (isDribble ? DRIBBLE_ACC_MULT : 1);
  if(angleDiff > TURN_PENALTY_RAD) acc *= 0.45;   // 急ターンで大きく減速

  const steerX = targetVX - vx;
  const steerY = targetVY - vy;
  const steerLen = Math.hypot(steerX, steerY);

  if(steerLen > 0.01){
    const maxSteer = mps(acc);
    const factor = Math.min(1, maxSteer / steerLen);
    vx += steerX * factor;
    vy += steerY * factor;
  }

  vx *= PLAYER_FRICTION;
  vy *= PLAYER_FRICTION;

  const spd = Math.hypot(vx, vy);
  if(spd > maxSpd){
    vx = vx/spd * maxSpd;
    vy = vy/spd * maxSpd;
  }

  p.vx = vx; p.vy = vy;
  p.mx += vx; p.my += vy;
}

// ====================== メインループ ======================
function initRound(){
  cancelAnimationFrame(G.rafId);
  const si = (G.stage-1)%4;

  Object.assign(G, {phase:'place', timerF:0, timerRunning:false, pressDelayPassed:false,
    aimMX:null, aimMY:null, particles:[], ballHolder:null, dribbleTimer:0, ended:false,
    power:KT[G.kickType].defaultPower,
    ball:{mx:CX, my:OWN_GA+1, vmx:0, vmy:0, trail:[]},
    gk:{mx:CX, my:OWN_GA+1.5}
  });

  // 選手生成 + 物理速度追加
  G.teammates = genTeammates().map(t => ({...t, vx:0, vy:0, omx:t.mx, omy:t.my}));
  G.opponents = genOpponents(si).map(o => ({...o, vx:0, vy:0, omx:o.mx, omy:o.my}));

  document.getElementById('stage-chip').textContent = 'STAGE ' + G.stage;
  updateScore(); updatePw(); updatePlaceBanner();
  Brain.assignMarkRoles();
  updateLearnBadge();
  loop();
}

function loop(){ update(); draw(); G.rafId = requestAnimationFrame(loop); }

function update(){
  if(G.ended) return;
  if(G.timerRunning){
    G.timerF++;
    if(G.timerF >= 360 && (G.phase==='flying'||G.phase==='loose')) doEnd(false,'タイムアップ！');
  }

  if(['flying','loose','pass'].includes(G.phase)) moveBall();
  if(G.phase === 'dribble') updateDribble();
  updateTeammates();
  updateOpponents();
  updateOffsideLine();
  advParticles();
}

// ── Ball (unchanged) ─────────────────────────────────────
function moveBall(){
  const b=G.ball;
  b.trail.push({mx:b.mx,my:b.my});
  if(b.trail.length>22) b.trail.shift();
  b.mx+=b.vmx; b.my+=b.vmy;
  b.vmx*=BALL_DECAY; b.vmy*=BALL_DECAY;
  spawnTrail();
  if(G.phase==='flying'&&Math.hypot(b.vmx,b.vmy)<BALL_SLOW) G.phase='loose';
  checkBall();
}

function checkBall(){
  if(G.ended) return;
  const{mx:bx,my:by}=G.ball;
  const spd=Math.hypot(G.ball.vmx,G.ball.vmy);
  if(bx<-3||bx>FW+3||by<-3||by>FH+3){doEnd(false,'ボールがラインを割りました！');return;}
  for(let oi=0;oi<G.opponents.length;oi++){
    const op=G.opponents[oi];
    if(Math.hypot(bx-op.mx,by-op.my)<R_OP_INTERCEPT){
      const ballAng=Math.atan2(G.ball.vmy,G.ball.vmx);
      const opToBallAng=Math.atan2(by-op.my,bx-op.mx);
      let relAng=opToBallAng-ballAng;
      while(relAng>Math.PI) relAng-=Math.PI*2;
      while(relAng<-Math.PI) relAng+=Math.PI*2;
      if(Math.abs(relAng)<1.75) continue;
      burstM(bx,by,'#ff4545');
      let nearTM=-1,nearD=Infinity;
      G.teammates.forEach((tm,ti)=>{const d=Math.hypot(tm.mx-op.mx,tm.my-op.my);if(d<nearD){nearD=d;nearTM=ti;}});
      Brain.onBallIntercepted(oi,nearTM);
      const pen=calcPenaltyPts();
      G.score+=pen;
      doEnd(false,'相手にカットされた！DFを避けて配球しよう。'+(pen<0?' ('+pen+'pts)':''));return;
    }
  }
  for(let i=0;i<G.teammates.length;i++){
    const tm=G.teammates[i];
    if(Math.hypot(bx-tm.mx,by-tm.my)<R_TM_CATCH){
      if(tm._offside){
        burstM(bx,by,'#ffaa00');
        if(tm.my>HALF){
          G.score+=15;
          doEnd(true,'⚠️ オフサイド！でもハーフ越え。+15pts',15,false);
        } else {
          doEnd(false,'⚠️ オフサイド！キックした瞬間に#'+tm.num+'が最終ラインより前にいた。');
        }
        return;
      }
      burstM(bx,by,'#00e5c8');
      Brain.onBallCaught(i);
      const si=(G.stage-1)%N_STAGES;
      const extend=Math.min(120, TIMER_MAX[si]-G.timerF+60);
      if(extend>0) G.timerF=Math.max(0, G.timerF-extend);
      G.ballHolder=i;tm.hasBall=true;G.ball.trail=[];
      G.phase='dribble';G.dribbleTimer=0;
      setBanner('<span class="hl">#'+tm.num+'がキャッチ！</span>ハーフライン突破へ！');
      return;
    }
  }
  if(spd<BALL_STOP){
    if(by>HALF){G.score+=20;doEnd(true,'ハーフを越えたが誰も受けられなかった。+20pts',20,false);}
    else if(by>OWN_PA+1.5){G.score+=8;doEnd(true,'ボールは前進！+8pts',8,false);}
    else{
      const pen=calcPenaltyPts();
      G.score+=pen;
      doEnd(false,'ボールが止まった。パワーを上げよう！'+(pen<0?' ('+pen+'pts)':''));
    }
  }
}

// ── 物理対応 updateTeammates ────────────────────────────────
function updateTeammates(){
  G.teammates.forEach((tm,i)=>{
    if(i===G.ballHolder) return;

    let sx=0,sy=0, t0x=0,t0y=0, fx=0,fy=0, sepx=0,sepy=0, gkx=0,gky=0, hmx=0,hmy=0;

    // Chase ball
    if(G.phase==='flying'||G.phase==='loose'||G.phase==='pass'){
      const bd=Math.hypot(tm.mx-G.ball.mx,tm.my-G.ball.my);
      if(bd<R_TM_BALL){
        const pred=Brain.predictBall(Brain.tmPredFrames);
        const tgx=pred?pred.mx:G.ball.mx;
        const tgy=pred?pred.my:G.ball.my;
        const dx=tgx-tm.mx,dy=tgy-tm.my,d=Math.sqrt(dx*dx+dy*dy)||1;
        sx=(dx/d)*mps(TM_CHASE_BALL_MS);
        sy=(dy/d)*mps(TM_CHASE_BALL_MS);
      } else if(bd>30){
        const dx=G.ball.mx-tm.mx,dy=G.ball.my-tm.my,d=Math.sqrt(dx*dx+dy*dy)||1;
        sx=(dx/d)*mps(2.0);
        sy=(dy/d)*mps(2.0);
      }
    }

    // Support run
    if(G.phase==='dribble'){
      const holder=G.ballHolder!==null?G.teammates[G.ballHolder]:null;
      if(holder && tm.my > holder.my + 2.0){
        const sideDir = tm.mx >= holder.mx ? 1 : -1;
        const diagX = clamp(tm.omx + sideDir * 5.0, 1.5, FW-1.5);
        const diagY = Math.min(FH-2, tm.omy + 8.0);
        sx = (diagX - tm.mx) * 0.016;
        sy = (diagY - tm.my) * 0.014;
      } else {
        const tgx = tm.omx + Math.sin(G.dribbleTimer*.012+tm.anim)*2.5;
        const tgy = Math.max(5.5, tm.omy + Math.min(G.dribbleTimer*.008, 6.2));
        sx = (tgx - tm.mx) * .010;
        sy = (tgy - tm.my) * .008;
      }
    }

    // tm[0] flee
    if(i===0&&(G.phase==='aim'||G.phase==='flying'||G.phase==='loose')){
      const dx=tm.mx-G.ball.mx,dy=tm.my-G.ball.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      t0x=(dx/d)*mps(TM0_FLEE_MS); t0y=(dy/d)*mps(TM0_FLEE_MS);
    }

    // Flee opponents
    G.opponents.forEach(op=>{
      const dx=tm.mx-op.mx,dy=tm.my-op.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<R_TM_FLEE){const s=((R_TM_FLEE-d)/R_TM_FLEE)*mps(9.3);fx+=(dx/d)*s;fy+=(dy/d)*s;}
    });

    // Separate teammates
    G.teammates.forEach((tm2,j)=>{
      if(j===i) return;
      const dx=tm.mx-tm2.mx,dy=tm.my-tm2.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<R_TM_SEP){const s=((R_TM_SEP-d)/R_TM_SEP)*mps(6.9);sepx+=(dx/d)*s;sepy+=(dy/d)*s;}
    });

    // Avoid GK
    {
      const dx=tm.mx-G.gk.mx,dy=tm.my-G.gk.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<R_GK_AVOID){const s=((R_GK_AVOID-d)/R_GK_AVOID)*mps(5.5);gkx+=(dx/d)*s;gky+=(dy/d)*s;}
    }

    // Heat bias
    if(Brain.rounds>2){
      const R=6.0;
      for(let a=0;a<8;a++){
        const ang=(a/8)*Math.PI*2;
        const cx2=clamp(tm.mx+Math.cos(ang)*R,.5,FW-.5);
        const cy2=clamp(tm.my+Math.sin(ang)*R,5.1,FH-.5);
        const v=Brain.tmHeatBias[hIdx(cx2,cy2)]??0;
        if(v>0){hmx+=Math.cos(ang)*v*mps(0.9);hmy+=Math.sin(ang)*v*mps(0.9);}
      }
    }

    // Wander
    tm.wTimer++;
    if(tm.wTimer>(G.phase==='place'?60:85)+Math.random()*40){tm.wTimer=0;tm.wAngle+=(Math.random()-.5)*1.2;}
    const wSpd=mps(G.phase==='place'?TM_WANDER_PLACE_MS:TM_WANDER_MS);
    let mvx=Math.cos(tm.wAngle)*wSpd+fx+sepx+sx+t0x+gkx+hmx;
    let mvy=Math.sin(tm.wAngle)*wSpd+fy+sepy+sy+t0y+gky+hmy;

    // Spring to home
    const sf=Math.hypot(fx,fy)>mps(2.8)?mps(.03):mps(.054);
    mvx+=(tm.omx-tm.mx)*sf; mvy+=(tm.omy-tm.my)*sf;

    // 物理適用（ここで加速度・慣性・方向転換が働く）
    const maxSpdFrame = mps(G.phase==='place'?TM_MAX_PLACE_MS:TM_MAX_MS);
    updatePhysics(tm, mvx, mvy, maxSpdFrame, false);

    clampTM(tm, i);
  });
}

function clampTM(tm, idx){
  tm.mx=clamp(tm.mx,.5,FW-.5);
  tm.my=clamp(tm.my,5.1,FH-.5);
  if(idx !== 0 && tm.my < OWN_PA+0.5) tm.my = OWN_PA+0.5;
  if(G._offsideLine!=null && G._offsideLine>HALF && Math.random()<0.70){
    const maxY = G._offsideLine - 2.0;
    if(tm.my > maxY) tm.my = maxY;
  }
  const REAR_R=0.7, REAR_ANG=Math.PI/3;
  const myFacing=tm.wAngle??Math.PI/2;
  const rearDir=myFacing+Math.PI;
  G.teammates.forEach(tm2=>{
    if(tm2===tm) return;
    const dx=tm2.mx-tm.mx, dy=tm2.my-tm.my;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d>REAR_R) return;
    const ang=Math.atan2(dy,dx);
    let diff=ang-rearDir;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    if(Math.abs(diff)<REAR_ANG){
      const push=(REAR_R-d+0.1);
      tm2.mx+=(dx/d)*push; tm2.my+=(dy/d)*push;
    }
  });
}

// ── 物理対応 updateOpponents ────────────────────────────────
function updateOpponents(){
  const now=Date.now()*.001;
  G.opponents.forEach((op,i)=>{
    let sepx=0,sepy=0;
    G.opponents.forEach((op2,j)=>{
      if(j===i) return;
      const dx=op.mx-op2.mx,dy=op.my-op2.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<R_OP_SEP){const s=((R_OP_SEP-d)/R_OP_SEP)*mps(4.6);sepx+=(dx/d)*s;sepy+=(dy/d)*s;}
    });

    let desiredVX = 0, desiredVY = 0;

    if(!G.pressDelayPassed&&G.phase!=='flying'&&G.phase!=='loose'&&G.phase!=='pass'&&G.phase!=='dribble'){
      // Patrol
      op.pTimer++;
      if(op.pTimer>80+i*6){op.pTimer=0;op.pAngle+=(Math.random()-.5)*1.2;}
      const ptx=op.omx+Math.sin(now*.28+op.anim)*4.9;
      const pty=op.omy+Math.cos(now*.22+op.anim)*1.85;
      desiredVX = (ptx-op.mx)*.10 + sepx*.3;
      desiredVY = (pty-op.my)*.10 + sepy*.3;
      op.mx=clamp(op.mx, 5.0, FW-5.0); // サイドライン回避
    } else {
      // Active press / chase
      let bestTM=null,bestScore=-Infinity;
      const assignedTMIdx=Brain.opMarkAssign[i]??-1;
      G.teammates.forEach((tm,ti)=>{
        if(tm._offside) return;
        const dMe=Math.hypot(tm.mx-op.mx,tm.my-op.my);
        let minOC=Infinity;
        G.opponents.forEach(op2=>{if(op2!==op)minOC=Math.min(minOC,Math.hypot(tm.mx-op2.mx,tm.my-op2.my));});
        const hBonus=tm.my>HALF-R_HALF_PRESS?(tm.my-(HALF-R_HALF_PRESS))*1.23:0;
        const markBonus=(Brain.rounds>4&&ti===assignedTMIdx)?5.5:0;
        const sc=minOC*.5-dMe*.35+hBonus+markBonus;
        if(sc>bestScore){bestScore=sc;bestTM=tm;}
      });

      let tx,ty;
      if(G.phase==='flying'||G.phase==='loose'||G.phase==='pass'){
        const pred=Brain.predictBall(Brain.opPredFrames);
        const pbx=pred?pred.mx:G.ball.mx, pby=pred?pred.my:G.ball.my;
        const bd=Math.hypot(op.mx-pbx,op.my-pby);
        const ballNearHalf = G.ball.my >= HALF-8 && G.ball.my <= HALF+8;
        if(bd<R_OP_BALL || ballNearHalf){tx=pbx;ty=pby;}
        else{tx=bestTM?bestTM.mx:op.omx;ty=bestTM?bestTM.my:op.omy;}
      } else if(G.phase==='dribble'&&G.ballHolder!==null){
        const h=G.teammates[G.ballHolder];
        const holderNearHalf = h.my >= HALF-6;
        if(i<3 || holderNearHalf){tx=h.mx;ty=h.my;}
        else{tx=bestTM?bestTM.mx:h.mx;ty=bestTM?bestTM.my:h.my;}
      } else {
        tx=bestTM?bestTM.mx:op.omx;ty=bestTM?bestTM.my:op.omy;
      }

      const dx=tx-op.mx,dy=ty-op.my,d=Math.sqrt(dx*dx+dy*dy)||1;
      const mult=G.phase==='dribble'?OP_DRIB_MULT:OP_PRESS_MULT;

      let offx=0, offy=0;
      if(G.phase==='dribble' && G.ballHolder!==null){
        const h=G.teammates[G.ballHolder];
        const toTarget=Math.atan2(h.my-op.my, h.mx-op.mx);
        const holderFacing=h._dribAngle??Math.PI/2;
        let behindAng=toTarget-holderFacing;
        while(behindAng>Math.PI) behindAng-=Math.PI*2;
        while(behindAng<-Math.PI) behindAng+=Math.PI*2;
        if(Math.abs(behindAng)<0.44){
          const side=(op.mx<h.mx)?1:-1;
          offx=side*mps(3.5);
        }
      }

      desiredVX = (dx/d)*op.spd*mult + sepx*.4 + offx;
      desiredVY = (dy/d)*op.spd*mult + sepy*.4 + offy;
      op._moveAng=Math.atan2(dy,dx);
    }

    // 物理適用（op.spdを基準に最大速度を設定）
    const maxSpdFrame = mps(4.8); // 相手は少し速め
    updatePhysics(op, desiredVX, desiredVY, maxSpdFrame, false);

    op.mx=clamp(op.mx,.5,FW-.5);
    op.my=clamp(op.my,.5,FH-.5);
    if(op.my<OWN_PA+.9) op.my=OWN_PA+.9;

    // Rear exclusion (unchanged)
    const REAR_R=0.7, REAR_ANG=Math.PI/3;
    const myFacing2=op._moveAng??op.pAngle??0;
    const rearDir2=myFacing2+Math.PI;
    G.opponents.forEach(op2=>{
      if(op2===op) return;
      const dx=op2.mx-op.mx, dy=op2.my-op.my;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d>REAR_R) return;
      const ang=Math.atan2(dy,dx);
      let diff=ang-rearDir2;
      while(diff>Math.PI) diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      if(Math.abs(diff)<REAR_ANG){
        const push=(REAR_R-d+0.1);
        op2.mx+=(dx/d)*push; op2.my+=(dy/d)*push;
      }
    });
  });
}

// ── 物理対応 updateDribble ────────────────────────────────
function updateDribble(){
  G.dribbleTimer++;
  const h=G.teammates[G.ballHolder];
  if(!h){doEnd(false,'error');return;}

  let closestOppD=Infinity;
  G.opponents.forEach(op=>{closestOppD=Math.min(closestOppD,Math.hypot(h.mx-op.mx,h.my-op.my));});

  // Turn-time before passing (unchanged)
  if(h._passTgt!=null){
    const tgt=G.teammates[h._passTgt];
    if(!tgt){ h._passTgt=null; }
    else {
      const dx=tgt.mx-h.mx, dy=tgt.my-h.my;
      const targetAngle=Math.atan2(dy,dx);
      const curAngle=h._dribAngle??targetAngle;
      let diff=targetAngle-curAngle;
      while(diff>Math.PI) diff-=Math.PI*2;
      while(diff<-Math.PI) diff+=Math.PI*2;
      const TURN_RATE=Math.PI/18;
      const step=clamp(diff,-TURN_RATE,TURN_RATE);
      h._dribAngle=(curAngle+step+Math.PI*4)%(Math.PI*2);
      h._turnTimer=(h._turnTimer||0)+1;
      if(Math.abs(diff)<0.26 || h._turnTimer>24){
        setBanner('<span class="hl">#'+h.num+'→#'+tgt.num+'</span>パス！'+(closestOppD<R_DANGER_PASS?'(緊急)':''));
        const dx2=tgt.mx-G.ball.mx,dy2=tgt.my-G.ball.my,d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
        G.ball.vmx=(dx2/d2)*PASS_SPD; G.ball.vmy=(dy2/d2)*PASS_SPD;
        flagOffsideAtPass(G.ball.my);
        h.hasBall=false; h._passTgt=null; h._turnTimer=0;
        G.ballHolder=null; G.phase='pass'; G.dribbleTimer=0;
        return;
      }
    }
  }

  // Pass selection (unchanged - long logic)
  const inDanger = closestOppD < R_DANGER_PASS;
  const periodicCheck = G.dribbleTimer>30 && G.dribbleTimer%60===0;
  const shouldTryPass = inDanger || periodicCheck;

  if(shouldTryPass && h._passTgt==null){
    let best=-1, bestSc=-Infinity;
    const facingAng = h._dribAngle ?? Math.PI/2;
    G.teammates.forEach((tm,i)=>{
      if(i===G.ballHolder) return;
      let minOD=Infinity;
      G.opponents.forEach(op=>{minOD=Math.min(minOD,Math.hypot(tm.mx-op.mx,tm.my-op.my));});
      const coverThreshold = inDanger ? 2.0 : 3.0;
      if(minOD < coverThreshold) return;

      const pdx=tm.mx-h.mx, pdy=tm.my-h.my;
      const pLen=Math.sqrt(pdx*pdx+pdy*pdy)||1;
      let laneBlocked=false;
      G.opponents.forEach(op=>{
        const t=((op.mx-h.mx)*pdx+(op.my-h.my)*pdy)/(pLen*pLen);
        if(t<0.15||t>0.85) return;
        const perpX=h.mx+t*pdx-op.mx, perpY=h.my+t*pdy-op.my;
        const perpD=Math.sqrt(perpX*perpX+perpY*perpY);
        if(perpD<2.5) laneBlocked=true;
      });
      if(laneBlocked) return;

      const passAng = Math.atan2(tm.my-h.my, tm.mx-h.mx);
      let angDiff = passAng - facingAng;
      while(angDiff > Math.PI) angDiff -= Math.PI*2;
      while(angDiff < -Math.PI) angDiff += Math.PI*2;
      if(Math.abs(angDiff) > Math.PI*2/3) return;

      const forwardBonus = (tm.my-h.my)*0.5;
      const sc = forwardBonus + minOD*0.9;
      if(sc>bestSc){bestSc=sc;best=i;}
    });

    if(best<0 && inDanger){
      G.teammates.forEach((tm,i)=>{
        if(i===G.ballHolder) return;
        let minOD=Infinity;
        G.opponents.forEach(op=>{minOD=Math.min(minOD,Math.hypot(tm.mx-op.mx,tm.my-op.my));});
        if(minOD<1.5) return;
        const sc=minOD*1.0+(tm.my-h.my)*0.2;
        if(sc>bestSc){bestSc=sc;best=i;}
      });
    }

    if(best>=0){ h._passTgt=best; h._turnTimer=0; return; }

    if(inDanger){
      let fallback=-1, fallbackSc=-Infinity;
      G.teammates.forEach((tm,i)=>{
        if(i===G.ballHolder) return;
        let minOD=Infinity;
        G.opponents.forEach(op=>{minOD=Math.min(minOD,Math.hypot(tm.mx-op.mx,tm.my-op.my));});
        if(minOD>fallbackSc){fallbackSc=minOD;fallback=i;}
      });
      if(fallback>=0){ h._passTgt=fallback; h._turnTimer=0; return; }
    }
  }

  // Tackle check (unchanged)
  if(closestOppD<R_OP_TACKLE){
    let closestOp=null;
    G.opponents.forEach(op=>{
      const d=Math.hypot(h.mx-op.mx,h.my-op.my);
      if(d===closestOppD) closestOp=op;
    });
    const holderFacing=h._dribAngle??Math.PI/2;
    let canTackle=true;
    if(closestOp){
      const opToHolder=Math.atan2(h.my-closestOp.my,h.mx-closestOp.mx);
      let relAng=opToHolder-holderFacing;
      while(relAng>Math.PI) relAng-=Math.PI*2;
      while(relAng<-Math.PI) relAng+=Math.PI*2;
      if(Math.abs(relAng)<1.75) canTackle=false;
    }
    if(canTackle){
      burstM(h.mx,h.my,'#ff4545');
      if(Math.random()<.45){setBanner('<span class="w">タックル！</span>かわした！');return;}
      doEnd(false,'タックルされた！でもナイスチャレンジ！');return;
    }
  }

  // Dribble direction (unchanged - bestAngle計算)
  let bestAngle=Math.PI/2, bestDScore=-Infinity;
  for(let a=0;a<12;a++){
    const ang=(a/12)*Math.PI*2;
    const testX=clamp(h.mx+Math.cos(ang)*5, .5, FW-.5);
    const testY=clamp(h.my+Math.sin(ang)*5, 5.1, FH-.5);
    const forwardBonus=(testY-h.my)*3.5;
    let oppPenalty=0;
    G.opponents.forEach(op=>{
      const d=Math.hypot(testX-op.mx,testY-op.my);
      if(d<8) oppPenalty+=(8-d)*1.8;
    });
    const score=forwardBonus-oppPenalty;
    if(score>bestDScore){bestDScore=score;bestAngle=ang;}
  }
  if(bestDScore<-10) bestAngle=Math.PI/2;

  if(h._dribAngle==null) h._dribAngle=Math.PI/2;
  let angDiff=bestAngle-h._dribAngle;
  while(angDiff>Math.PI) angDiff-=Math.PI*2;
  while(angDiff<-Math.PI) angDiff+=Math.PI*2;
  h._dribAngle+=clamp(angDiff,-0.20,0.20);

  // 物理適用（ドリブル専用）
  const spdFrame = mps(TM_DRIBBLE_MS);
  const desiredVX = Math.cos(h._dribAngle) * spdFrame;
  const desiredVY = Math.sin(h._dribAngle) * spdFrame;

  const maxSpdFrame = mps(TM_DRIBBLE_MS);
  updatePhysics(h, desiredVX, desiredVY, maxSpdFrame, true); // isDribble=true

  G.ball.mx=h.mx; G.ball.my=h.my+2.15;

  if(h.my>HALF){
    burstM(h.mx,h.my,'#00e5c8');
    const pts=Math.max(40,Math.round(160-G.timerF*.42));
    G.score+=pts; doEnd(true,'#'+h.num+'がハーフライン突破！',pts);
  }
}

// ── Offside / other functions (unchanged) ───────────────────
function calcOffsideLine(){
  const sorted=[...G.opponents].sort((a,b)=>b.my-a.my);
  const defLine = sorted.length>=1 ? sorted[0].my : HALF;
  return Math.max(defLine, HALF, G.ball.my);
}
function calcPenaltyPts(){
  const by=G.ball.my;
  if(by > 20) return 0;
  const distPen = -Math.round((1 - by/20) * 30);
  let coverage=0;
  G.teammates.forEach(tm=>{ if(tm.my < by && !tm.hasBall) coverage++; });
  const coverPen = -Math.round(Math.max(0, 3-coverage)/3 * 20);
  return distPen + coverPen;
}
function updateOffsideLine(){
  G._offsideLine=calcOffsideLine();
}
function flagOffsideAtPass(ballMY){
  if(ballMY<=HALF){
    G.teammates.forEach(tm=>{ tm._offside=false; });
    return;
  }
  const oLine=calcOffsideLine();
  G.teammates.forEach(tm=>{
    tm._offside=(tm.my>HALF && tm.my>ballMY && tm.my>oLine);
  });
}

// Input handling (unchanged)
CV.addEventListener('click',onField);
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=CV.getBoundingClientRect(),t=e.touches[0];
  onField({clientX:t.clientX,clientY:t.clientY,_r:r,_sx:CW/r.width,_sy:CH/r.height});
},{passive:false});

function clickM(e){
  const r=e._r||CV.getBoundingClientRect();
  const sx=e._sx||(CW/r.width),sy=e._sy||(CH/r.height);
  const cpx=(e.clientX-r.left)*sx-PAD;
  const cpy=(e.clientY-r.top)*sy-PAD;
  return{mx:cpx/SC, my:FH-cpy/SC};
}

function onField(e){
  if(G.ended) return;
  const{mx,my}=clickM(e);
  if(G.phase==='place'){
    const inZone=G.kickType==='kick'
      ?(mx>=GA_L&&mx<=GA_R&&my>=0&&my<=OWN_GA)
      :(mx>=PA_L&&mx<=PA_R&&my>=0&&my<=OWN_PA);
    if(inZone){
      G.ball.mx=mx; G.ball.my=my;
      G.gk.mx=mx; G.gk.my=my-2.15;
      G.phase='aim'; G.timerRunning=true;
      setBanner('<span class="hl">②蹴る方向</span>をタップ！<span class="w">フリーな味方</span>を狙え！');
    } else updatePlaceBanner();
    return;
  }
  if(G.phase==='aim'){
    G.phase='flying';
    const dx=mx-G.ball.mx,dy=my-G.ball.my,d=Math.sqrt(dx*dx+dy*dy)||1;
    const spd=ktSpd();
    G.ball.vmx=dx/d*spd; G.ball.vmy=dy/d*spd; G.ball.trail=[];
    flagOffsideAtPass(G.ball.my);
    setBanner('<span class="hl">'+KT[G.kickType].label+'</span>！');
  } else if(G.phase==='dribble' && G.ballHolder!==null){
    const h=G.teammates[G.ballHolder];
    const bx=G.ball.mx, by=G.ball.my;
    const dx=mx-bx, dy=my-by, d=Math.sqrt(dx*dx+dy*dy)||1;
    const spd=ktSpd();
    G.ball.vmx=dx/d*spd; G.ball.vmy=dy/d*spd; G.ball.trail=[];
    h.hasBall=false; h._passTgt=null;
    G.ballHolder=null;
    G.phase='flying';
    flagOffsideAtPass(by);
    setBanner('<span class="hl">キック！</span>');
  }
}

CV.addEventListener('mousemove',e=>{
  if(G.phase!=='aim') return;
  const m=clickM(e); G.aimMX=m.mx; G.aimMY=m.my;
});
CV.addEventListener('mouseleave',()=>{G.aimMX=null;G.aimMY=null;});

// ── Draw (方向表示を速度ベクトルベースに変更) ───────────────
function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawField(); drawTimerBar(); drawTrailGfx();
  drawTeammates(); drawOpponents(); drawOppGK(); drawGK(); drawBall();
  if(G._offsideLine!=null && G._offsideLine>HALF){
    ctx.save();
    ctx.setLineDash([5,4]);
    ctx.strokeStyle='rgba(255,170,0,0.65)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(PAD,py(G._offsideLine));
    ctx.lineTo(PAD+FW*SC,py(G._offsideLine));
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,170,0,0.75)';
    ctx.font='bold 9px Zen Kaku Gothic New';
    ctx.fillText('オフサイドライン',PAD+4,py(G._offsideLine)-3);
    ctx.restore();
  }
  if(G.phase==='place') drawPlaceGuide();
  if(G.phase==='aim'&&G.aimMX!==null) drawAimLine();
  drawParticles();
}

function drawField(){ /* 完全に元のコードと同じ */ 
  const N=10,fw=FW*SC,fh=FH*SC;
  for(let i=0;i<N;i++){
    ctx.fillStyle=i%2===0?'#1c6132':'#1f6e38';
    ctx.fillRect(PAD,PAD+i*(fh/N),fw,fh/N+1);
  }
  ctx.strokeStyle='rgba(255,255,255,.76)';ctx.lineWidth=2;ctx.strokeRect(PAD,PAD,fw,fh);
  ctx.save();ctx.setLineDash([8,6]);
  ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(PAD,py(HALF));ctx.lineTo(PAD+fw,py(HALF));ctx.stroke();ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.24)';ctx.font='10px Zen Kaku Gothic New';
  ctx.fillText('ハーフライン',PAD+4,py(HALF)-4);
  ctx.strokeStyle='rgba(255,255,255,.24)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(px(CX),py(HALF),CC_R*SC,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(px(CX),py(HALF),2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.38)';ctx.fill();
  ctx.fillStyle='rgba(77,166,255,.033)';ctx.fillRect(PAD,py(HALF),fw,py(0)-py(HALF));
  ctx.fillStyle='rgba(255,69,69,.033)';ctx.fillRect(PAD,PAD,fw,py(HALF)-PAD);
  const paw=(PA_R-PA_L)*SC, gaw=(GA_R-GA_L)*SC;
  ctx.strokeStyle='rgba(255,255,255,.52)';ctx.lineWidth=1.5;
  ctx.strokeRect(px(PA_L),py(OWN_PA),paw,py(0)-py(OWN_PA));
  ctx.beginPath();ctx.arc(px(CX),py(8),2.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.38)';ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(px(CX),py(8),CC_R*SC,Math.PI*1.14,Math.PI*1.86,false);
  ctx.strokeStyle='rgba(255,255,255,.30)';ctx.lineWidth=1.4;ctx.stroke();ctx.restore();
  const gaAct=G.phase==='place';
  if(gaAct&&G.kickType==='kick'){ctx.fillStyle='rgba(0,229,200,.08)';ctx.fillRect(px(GA_L),py(OWN_GA),gaw,py(0)-py(OWN_GA));}
  if(gaAct&&G.kickType!=='kick'){ctx.fillStyle='rgba(247,212,76,.08)';ctx.fillRect(px(PA_L),py(OWN_PA),paw,py(0)-py(OWN_PA));}
  ctx.strokeStyle=gaAct&&G.kickType==='kick'?'rgba(0,229,200,.85)':'rgba(255,255,255,.60)';
  ctx.lineWidth=gaAct&&G.kickType==='kick'?2.5:1.5;
  ctx.strokeRect(px(GA_L),py(OWN_GA),gaw,py(0)-py(OWN_GA));
  if(gaAct&&G.kickType==='kick'){
    ctx.fillStyle='rgba(0,229,200,.78)';ctx.font='bold 10px Zen Kaku Gothic New';
    ctx.textAlign='center';ctx.fillText('ここに置く',px(CX),py(OWN_GA)-5);ctx.textAlign='left';
  }
  if(gaAct&&G.kickType!=='kick'){
    ctx.strokeStyle='rgba(247,212,76,.85)';ctx.lineWidth=2.5;
    ctx.strokeRect(px(PA_L),py(OWN_PA),paw,py(0)-py(OWN_PA));
    ctx.fillStyle='rgba(247,212,76,.78)';ctx.font='bold 10px Zen Kaku Gothic New';
    ctx.textAlign='center';ctx.fillText('ここに置く',px(CX),py(OWN_PA)-5);ctx.textAlign='left';
  }
  drawGoal(px(GL_L),px(GL_R),py(0),'down');
  ctx.strokeStyle='rgba(255,255,255,.52)';ctx.lineWidth=1.5;
  ctx.strokeRect(px(PA_L),py(FH),paw,py(OPP_PA)-py(FH));
  ctx.beginPath();ctx.arc(px(CX),py(FH-8),2.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.38)';ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(px(CX),py(FH-8),CC_R*SC,Math.PI*.14,Math.PI*.86,false);
  ctx.strokeStyle='rgba(255,255,255,.30)';ctx.lineWidth=1.4;ctx.stroke();ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,.60)';ctx.lineWidth=1.5;
  ctx.strokeRect(px(GA_L),py(FH),gaw,py(OPP_GA)-py(FH));
  drawGoal(px(GL_L),px(GL_R),py(FH),'up');
}

function drawGoal(x1,x2,gy,dir){
  const w=x2-x1,ph=13;ctx.fillStyle='rgba(255,255,255,.88)';
  if(dir==='down'){ctx.fillRect(x1-4,gy,5,ph);ctx.fillRect(x2-1,gy,5,ph);ctx.fillRect(x1-4,gy,w+9,4);}
  else{
    ctx.fillRect(x1-4,gy-ph,5,ph);ctx.fillRect(x2-1,gy-ph,5,ph);ctx.fillRect(x1-4,gy-4,w+9,4);
    ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(x1,gy-14,w,14);
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.7;
    for(let xi=x1;xi<=x2;xi+=9){ctx.beginPath();ctx.moveTo(xi,gy-14);ctx.lineTo(xi,gy);ctx.stroke();}
    for(let yi=gy-14;yi<=gy;yi+=5){ctx.beginPath();ctx.moveTo(x1,yi);ctx.lineTo(x2,yi);ctx.stroke();}
  }
}

function drawTimerBar(){
  if(!G.timerRunning) return;
  const p=G.timerF/TIMER_MAX[(G.stage-1)%N_STAGES];
  ctx.fillStyle='rgba(0,0,0,.26)';ctx.fillRect(PAD,PAD+2,FW*SC,5);
  ctx.fillStyle=`hsl(${120-p*120},90%,55%)`;ctx.fillRect(PAD,PAD+2,FW*SC*(1-p),5);
}

function drawPlaceGuide(){
  const p=.5+.5*Math.sin(Date.now()*.004);
  const isKick=G.kickType==='kick';
  const x1=px(isKick?GA_L:PA_L),w=(isKick?GA_R-GA_L:PA_R-PA_L)*SC;
  const y1=py(isKick?OWN_GA:OWN_PA),h=py(0)-(isKick?py(OWN_GA):py(OWN_PA));
  ctx.save();
  ctx.strokeStyle=`rgba(${isKick?'0,229,200':'247,212,76'},${.4+p*.5})`;
  ctx.lineWidth=2+p*1.5;ctx.strokeRect(x1,y1,w,h);ctx.restore();
}

function drawTrailGfx(){
  G.ball.trail.forEach((p,i)=>{
    const a=(i/G.ball.trail.length)*.52;
    ctx.beginPath();ctx.arc(px(p.mx),py(p.my),4*(i/G.ball.trail.length),0,Math.PI*2);
    ctx.fillStyle=`rgba(247,212,76,${a})`;ctx.fill();
  });
}

function drawDir(bpx,bpy,ang,r,col){
  const fx=Math.cos(ang),fy=Math.sin(ang);
  const tx=bpx+fx*(r+4), ty=bpy-fy*(r+4);
  const lx=bpx+fx*r, ly=bpy-fy*r;
  ctx.beginPath();
  ctx.moveTo(tx,ty);
  ctx.lineTo(lx+Math.cos(ang+Math.PI/2)*3, ly-Math.sin(ang+Math.PI/2)*3);
  ctx.lineTo(lx-Math.cos(ang+Math.PI/2)*3, ly+Math.sin(ang+Math.PI/2)*3);
  ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
}

function drawTeammates(){
  const R=7.7;
  G.teammates.forEach((tm,i)=>{
    const bpx=px(tm.mx),bpy=py(tm.my),ph=tm.my>HALF,hld=i===G.ballHolder;
    pShadow(bpx,bpy);
    if(ph||hld){ctx.beginPath();ctx.arc(bpx,bpy,R+5,0,Math.PI*2);
      ctx.fillStyle=hld?'rgba(247,212,76,.17)':'rgba(0,229,200,.10)';ctx.fill();}
    ctx.beginPath();ctx.arc(bpx,bpy,R,0,Math.PI*2);ctx.fillStyle='#2466b8';ctx.fill();
    ctx.strokeStyle=hld?'#f7d44c':ph?'#00e5c8':'#5ea8ff';ctx.lineWidth=hld?2.2:1.6;ctx.stroke();
    pLabel(bpx,bpy,tm.num,'#fff',7);

    // 物理速度ベクトルで方向表示（リアル）
    const curSpd = Math.hypot(tm.vx||0, tm.vy||0);
    const ang = curSpd > 0.05 
      ? Math.atan2(tm.vy||0, tm.vx||0) 
      : (hld ? (tm._dribAngle??Math.PI/2) : (tm.wAngle??Math.PI/2));
    drawDir(bpx,bpy,ang,R,hld?'#f7d44c':'rgba(255,255,255,.75)');

    if((G.phase==='aim'||G.phase==='place'||G.phase==='flying'||G.phase==='loose'||G.phase==='pass')&&ph&&!hld){
      ctx.fillStyle='rgba(0,229,204,.80)';ctx.font='bold 6px Zen Kaku Gothic New';
      ctx.textAlign='center';ctx.fillText('フリー',bpx,bpy-R-5);ctx.textAlign='left';
    }
    if(hld){ctx.fillStyle='rgba(247,212,76,.88)';ctx.font='bold 6px Zen Kaku Gothic New';
      ctx.textAlign='center';ctx.fillText('▶DRIB',bpx,bpy-R-5);ctx.textAlign='left';}
    if(tm._offside&&(G.phase==='flying'||G.phase==='pass')){
      ctx.fillStyle='rgba(255,170,0,.90)';ctx.font='bold 6px Zen Kaku Gothic New';
      ctx.textAlign='center';ctx.fillText('⚠️OFF',bpx,bpy+R+8);ctx.textAlign='left';
    }
  });
}

function drawOpponents(){
  const R=7.7;
  G.opponents.forEach((op,i)=>{
    const bpx=px(op.mx),bpy=py(op.my);pShadow(bpx,bpy);
    ctx.beginPath();ctx.arc(bpx,bpy,R,0,Math.PI*2);ctx.fillStyle='#a81818';ctx.fill();
    ctx.strokeStyle='#ff7070';ctx.lineWidth=1.6;ctx.stroke();pLabel(bpx,bpy,'D','#fff',7);

    // 物理速度ベクトルで方向表示
    const curSpd = Math.hypot(op.vx||0, op.vy||0);
    const ang = curSpd > 0.05 
      ? Math.atan2(op.vy||0, op.vx||0) 
      : (op._moveAng??op.pAngle??0);
    drawDir(bpx,bpy,ang,R,'rgba(255,160,160,.80)');
  });
}

function drawOppGK(){
  const bpx=px(OPP_GK.mx), bpy=py(OPP_GK.my);
  pShadow(bpx,bpy);
  ctx.beginPath();ctx.arc(bpx,bpy,11.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,69,69,.08)';ctx.fill();
  ctx.beginPath();ctx.arc(bpx,bpy,9.1,0,Math.PI*2);
  ctx.fillStyle='#881010';ctx.fill();
  ctx.strokeStyle='#ff4545';ctx.lineWidth=1.8;ctx.stroke();
  pLabel(bpx,bpy,'GK','#fff',7);
}
function drawGK(){
  const bpx=px(G.gk.mx),bpy=py(G.gk.my);pShadow(bpx,bpy);
  ctx.beginPath();ctx.arc(bpx,bpy,11.2,0,Math.PI*2);ctx.fillStyle='rgba(0,229,200,.08)';ctx.fill();
  ctx.beginPath();ctx.arc(bpx,bpy,9.1,0,Math.PI*2);ctx.fillStyle='#009976';ctx.fill();
  ctx.strokeStyle='#00e5c8';ctx.lineWidth=1.8;ctx.stroke();pLabel(bpx,bpy,'GK','#fff',7);
  drawDir(bpx,bpy,Math.PI/2,9.1,'rgba(0,229,200,.85)');
}

function drawBall(){
  const bpx=px(G.ball.mx),bpy=py(G.ball.my);
  ctx.beginPath();ctx.ellipse(bpx,bpy+6,6,2.5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.19)';ctx.fill();
  ctx.beginPath();ctx.arc(bpx,bpy,7,0,Math.PI*2);ctx.fillStyle='#f7d44c';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.4;ctx.stroke();
  ctx.beginPath();ctx.arc(bpx,bpy,3,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.20)';ctx.fill();
}

function drawAimLine(){
  const bpx=px(G.ball.mx),bpy=py(G.ball.my),apx=px(G.aimMX),apy=py(G.aimMY);
  const col=KT[G.kickType].col;
  ctx.save();ctx.setLineDash([6,5]);ctx.strokeStyle=col+'bb';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(bpx,bpy);ctx.lineTo(apx,apy);ctx.stroke();ctx.restore();
  const ang=Math.atan2(apy-bpy,apx-bpx);ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(apx+Math.cos(ang)*9,apy+Math.sin(ang)*9);
  ctx.lineTo(apx+Math.cos(ang+2.5)*6,apy+Math.sin(ang+2.5)*6);
  ctx.lineTo(apx+Math.cos(ang-2.5)*6,apy+Math.sin(ang-2.5)*6);
  ctx.closePath();ctx.fill();
}

function drawParticles(){
  G.particles.forEach(p=>{
    const maxA = p.alpha ?? 1.0;
    ctx.globalAlpha=Math.max(0,p.life*maxA);
    ctx.beginPath();ctx.arc(p.dpx,p.dpy,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();
  });
  ctx.globalAlpha=1;
}

function pShadow(x,y){ctx.beginPath();ctx.ellipse(x,y+10,8,3.5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.16)';ctx.fill();}
function pLabel(x,y,t,c,fs=8){ctx.fillStyle=c;ctx.font=`bold ${fs}px Orbitron`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,x,y);ctx.textAlign='left';ctx.textBaseline='alphabetic';}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function burstM(mx,my,col){
  for(let i=0;i<4;i++){
    const a=Math.random()*Math.PI*2,s=(.15+Math.random()*.54);
    G.particles.push({mx,my,vmx:Math.cos(a)*s,vmy:Math.sin(a)*s,dpx:px(mx),dpy:py(my),r:Math.random()*4+2,life:1,col});
  }
}

function spawnTrail(){
  if(Math.random()<.10){
    const jx=(Math.random()-.5)*.4,jy=(Math.random()-.5)*.4;
    const mx=G.ball.mx+jx,my=G.ball.my+jy;
    const col=KT[G.kickType].col;
    G.particles.push({mx,my,vmx:(Math.random()-.5)*.06,vmy:(Math.random()-.5)*.06,
      dpx:px(mx),dpy:py(my),r:1.0,life:.10,col,alpha:.20});
  }
}

function advParticles(){
  G.particles.forEach(p=>{
    p.mx+=p.vmx; p.my+=p.vmy; p.vmy-=.008;
    p.dpx=px(p.mx); p.dpy=py(p.my); p.life-=.022;
  });
  G.particles=G.particles.filter(p=>p.life>0);
  if(G.particles.length>4) G.particles=G.particles.slice(-4);
}

function updateLearnBadge(){
  const r = Brain.rounds;
  const lvl = r<5 ? '初心者' : r<20 ? '学習中' : r<50 ? '上達中' : r<100 ? '熟練' : r<200 ? 'エキスパート' : 'マスター';
  const explPct = Math.round((Brain.eps / Brain.EPS0) * 100);
  const tmP = Math.round(Brain.tmPredAcc * 100);
  const opP = Math.round(Brain.opPredAcc * 100);

  const el = document.getElementById('learn-badge');
  if(el) el.textContent = `🧠 ${lvl}(${r}戦) 探索率${explPct}%↓ 予測:味${tmP}%敵${opP}%`;
}

// ── Round end / UI (unchanged) ───────────────────────────────
function doEnd(success,msg,pts=0,halfline){
  if(G.ended) return;
  G.ended=true;cancelAnimationFrame(G.rafId);G.phase='result';G.timerRunning=false;
  Brain.onRoundEnd(halfline===undefined?success:halfline, pts);
  const full=halfline===undefined?success:halfline;updateScore();

  const ov=document.getElementById('overlay');
  const fw=document.getElementById('field-wrap');
  const wrapH=fw.offsetHeight||400;
  const ballPxInCanvas=(PAD+(FH-G.ball.my)*SC)/CH * wrapH;
  const tenMeterShift=(10*SC)/CH * wrapH;
  const boxH=ov.offsetHeight||130;
  const topPx=clamp(ballPxInCanvas - boxH - 20 - tenMeterShift, 6, wrapH - boxH - 6);
  ov.style.top=Math.round(topPx)+'px';

  const box=document.getElementById('ov-box');
  box.className='ov-box '+(full?'success':success?'partial':'failure');
  document.getElementById('ov-icon').textContent=full?'🎉':success?'👍':'😅';
  document.getElementById('ov-title').textContent=full?'突破成功！':success?'前進した！':'失敗…';
  document.getElementById('ov-pts').textContent=pts>0?'+'+pts+' pts':'';
  document.getElementById('ov-msg').textContent=msg;
  document.getElementById('overlay').classList.add('show');
  if(full){G.successCount++;if(G.successCount%3===0&&G.stage<N_STAGES)G.stage++;}
}
